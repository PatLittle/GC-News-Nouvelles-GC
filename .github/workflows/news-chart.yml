name: Update news TYPE_EN chart

on:
  schedule:
    - cron: "20 6 * * *"   # daily
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install python deps
        run: pip install pandas requests

      - name: Generate Mermaid chart (.mmd)
        run: python scripts/make_mermaid_news_xychart.py

      - name: Install mermaid-cli
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Render SVG from Mermaid
        run: |
          # extract the mermaid block content into a .mermaid file for mmdc
          python - <<'PY'
          from pathlib import Path
          txt = Path("docs/news_type_30d.mmd").read_text(encoding="utf-8")
          inside = txt.split("```mermaid",1)[1].split("```",1)[0].strip() + "\n"
          Path("docs/news_type_30d.mermaid").write_text(inside, encoding="utf-8")
          PY
          mmdc -i docs/news_type_30d.mermaid -o docs/news_type_30d.svg

      - name: Commit updates
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add docs/news_type_30d.mmd docs/news_type_30d.mermaid docs/news_type_30d.svg
          git commit -m "Update TYPE_EN chart (last 30 days)" --allow-empty
          git push
