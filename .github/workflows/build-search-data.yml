name: Build search data
on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'combined_news.csv'
      - 'combined_news_quotes.csv'
      - 'combined_news_images.csv'
      - 'scripts/build_search_index.py'
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scripts/build_search_index.py
      - name: Commit generated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/search-data.json
          git commit -m "Update search data JSON"
          git push
          
