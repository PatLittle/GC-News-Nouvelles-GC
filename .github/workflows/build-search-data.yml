name: Build search data

on:
  workflow_run:
    workflows: ["Extract News Quotes And Images"]
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gc-news-data-pipeline
  cancel-in-progress: false

jobs:
  build:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python scripts/build_search_index.py
      - name: Commit generated JSON
        run: |
          if ! git diff --quiet docs/search-data.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add docs/search-data.json
            git commit -m "Update search data JSON"
            git pull --rebase
            git push
          fi
