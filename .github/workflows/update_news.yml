name: Update News Data

permissions:
  contents: write

on:
  schedule:
    - cron: '0 0 * * *'  # daily at 00:00 UTC
  workflow_dispatch:

concurrency:
  group: gc-news-data-pipeline
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install pandas requests beautifulsoup4 spacy
          python -m spacy download en_core_web_sm

      - name: Refresh primary news CSV
        run: python update_news_data.py

      - name: Scrape and enrich half-masting data
        run: |
          python scripts/scrape_half_masting.py
          python scripts/enrich_halfmast.py

      - name: Commit refreshed source data
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add combined_news.csv data/half_masting_combined.csv data/half_masting_enriched.csv
          git diff --cached --quiet && exit 0
          git commit -m "Update news and half-masting data"
          git pull --rebase
          git push
