name: Update TYPE_EN quarterly radar (last 12 complete months)

on:
  schedule:
    - cron: "30 6 * * *"   # daily 06:30 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install pandas requests

      - name: Run radar generator
        run: |
          mkdir -p docs
          python scripts/make_mermaid_news_radchart.py

      - name: Commit if changed
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

          git add docs/type_by_quarter_last12_complete_months_radar.mmd
          git diff --cached --quiet || git commit -m "Update quarterly TYPE_EN radar (last 12 complete months)"
          git push
