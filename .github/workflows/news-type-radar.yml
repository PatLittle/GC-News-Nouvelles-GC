name: Update GC News TYPE_EN radar (last 7 days)

on:
  schedule:
    - cron: "25 6 * * *"   # daily at 06:25 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install pandas requests

      - name: Generate Mermaid radar chart (.mmd)
        run: |
          mkdir -p docs
          python - <<'PY'
          import io
          from datetime import timedelta
          from pathlib import Path

          import pandas as pd
          import requests

          CSV_URL = "https://github.com/PatLittle/GC-News-Nouvelles-GC/raw/refs/heads/main/combined_news.csv"
          DAYS = 7
          MAX_AXES = 12  # keep radar readable

          OUT_MMD = Path("docs/news_type_7d_radar.mmd")

          def esc_label(s: str) -> str:
              # radar axis labels are identifiers-ish; safest is to quote if spaces/odd chars
              s = str(s).replace('"', '\\"')
              if any(c.isspace() for c in s) or any(c in s for c in [",", "{", "}", "[", "]"]):
                  return f'"{s}"'
              return s

          # Download CSV
          r = requests.get(CSV_URL, timeout=60)
          r.raise_for_status()
          df = pd.read_csv(io.BytesIO(r.content))

          # Required columns
          if "PUBDATE" not in df.columns or "TYPE_EN" not in df.columns:
              raise SystemExit(f"Expected PUBDATE and TYPE_EN. Columns: {list(df.columns)}")

          # Parse PUBDATE
          dt = pd.to_datetime(df["PUBDATE"], errors="coerce", utc=True)
          df = df.loc[dt.notna()].copy()
          df["_date"] = dt.loc[dt.notna()].dt.tz_convert(None).dt.date
          df["_type"] = df["TYPE_EN"].astype(str).str.strip()

          # Last 7 days relative to newest date present
          max_date = pd.to_datetime(df["_date"]).max().date()
          start_date = (pd.to_datetime(max_date) - timedelta(days=DAYS - 1)).date()
          df = df[df["_date"] >= start_date].copy()

          # Counts by TYPE_EN over the window
          counts = (
              df.groupby("_type")
                .size()
                .sort_values(ascending=False)
          )

          # Keep top N axes (otherwise radar becomes unreadable)
          counts = counts.head(MAX_AXES)

          # If no data, still emit a valid stub
          axes = [esc_label(t) for t in counts.index.tolist()] or ['"No data"']
          values = [int(v) for v in counts.values.tolist()] or [0]

          vmax = max(values) if values else 1
          vmax = max(1, vmax)

          # Mermaid radar-beta
          lines = []
          lines.append("```mermaid")
          lines.append("radar-beta")
          lines.append(f'  title "GC News — TYPE_EN counts (last {DAYS} days)"')
          lines.append("  axis " + ", ".join(axes))
          lines.append(f"  curve total{{" + ",".join(str(v) for v in values) + "}}")
          lines.append("```")

          OUT_MMD.write_text("\n".join(lines) + "\n", encoding="utf-8")
          print("Generated:", OUT_MMD)
          PY

      - name: Install mermaid-cli
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Extract Mermaid block and render SVG
        run: |
          python - <<'PY'
          from pathlib import Path
          txt = Path("docs/news_type_7d_radar.mmd").read_text(encoding="utf-8")
          inside = txt.split("```mermaid",1)[1].split("```",1)[0].strip() + "\n"
          Path("docs/news_type_7d_radar.mermaid").write_text(inside, encoding="utf-8")
          PY

          # Puppeteer sandbox fix (GitHub runners)
          cat > puppeteer-config.json <<'JSON'
          {
            "args": ["--no-sandbox", "--disable-setuid-sandbox"]
          }
          JSON

          mmdc \
            -i docs/news_type_7d_radar.mermaid \
            -o docs/news_type_7d_radar.svg \
            --puppeteerConfigFile puppeteer-config.json

      - name: Commit and push if changed
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

          git add docs/news_type_7d_radar.*
          git diff --cached --quiet || git commit -m "Update TYPE_EN radar (last 7 days)"
          git push
